name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_and_push:
    runs-on: self-hosted
    steps:
      -
        name: Checkout
        uses: actions/checkout@v5
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/mip:${{ github.sha }}
          platforms: linux/amd64,linux/arm64

  deploy:
    needs: build_and_push
    runs-on: self-hosted
    steps:
      -
        name: SSH and deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ${{ secrets.SERVER_APP_DIR }}
            sudo curl -Lf "https://raw.githubusercontent.com/DoctorPok42/MIP/main/compose.yml" -o compose.yml
            docker pull ${{ vars.DOCKERHUB_USERNAME }}/mip:${{ github.sha }}
            docker compose -f compose.yml up -d --force-recreate

  update_latest:
    needs: build_and_push
    runs-on: self-hosted
    steps:
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Update latest tag
        run: |
          docker pull ${{ vars.DOCKERHUB_USERNAME }}/mip:${{ github.sha }}
          docker tag ${{ vars.DOCKERHUB_USERNAME }}/mip:${{ github.sha }} ${{ vars.DOCKERHUB_USERNAME }}/mip:latest
          docker push ${{ vars.DOCKERHUB_USERNAME }}/mip:latest
